<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Frontend Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      margin-top: 20px;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>User System Demo (Frontend)</h2>

  <div class="box">
    <h3>Get Users</h3>
    <button onclick="loadUsers()">Load Users</button>
    <ul id="userList"></ul>
  </div>

  <div class="box">
    <h3>Insert User via CSV</h3>
    <input type="file" id="fileInput" accept=".csv" />
    <button onclick="uploadFile()">Upload</button>
  </div>
</div>

<script>
  async function loadUsers() {
  try {
    const res = await fetch("http://localhost:8000/users");
    const data = await res.json();

    const list = document.getElementById("userList");
    list.innerHTML = "";

    data.forEach(user => {
      const li = document.createElement("li");

      li.textContent = `ID: ${user.id} | Name: ${user.full_name || "-"} | Email: ${user.email || "-"}`;

      list.appendChild(li);
    });

  } catch (err) {
    console.error(err);
    alert("Failed to load users");
  }
}

  async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];

  if (!file) {
    alert("Please select a CSV file");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("http://localhost:8000/upload", {
    method: "POST",
    body: formData
  });

  const result = await res.json();

  alert(result.message);

  // render data กลับ
  const list = document.getElementById("userList");
  list.innerHTML = "";

  result.data.forEach(user => {
    const li = document.createElement("li");
    li.textContent = `ID: ${user.id} | Name: ${user.full_name} | Email: ${user.email}`;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
